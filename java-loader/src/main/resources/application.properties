# Milvus connection
milvus.host=localhost
milvus.port=19530
milvus.collection=documents

# Embedding API
# Supported types: ollama, openai
embedding.api.type=ollama
embedding.api.url=http://localhost:11434
embedding.model=nomic-embed-text
# For openai type, set your API key here or via EMBEDDING_API_KEY env var
embedding.api.key=

# Vector dimension must match the model output:
#   nomic-embed-text  -> 768
#   text-embedding-3-small (openai) -> 1536
#   text-embedding-ada-002 (openai) -> 1536
embedding.dimension=768

# Path to the CSV data file (relative to where you run the jar, or absolute)
data.file.path=../data/sample_documents.csv
